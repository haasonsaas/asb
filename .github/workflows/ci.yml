name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@cac5638c2935870453cf669e803936a80e17ac7b
        with:
          go-version: "1.26.2"
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1

      - name: Format
        run: |
          make fmt
          git diff --exit-code

      - name: Buf lint
        run: buf lint

      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        run: |
          if git show origin/main:buf.yaml >/dev/null 2>&1; then
            buf breaking --against '.git#ref=refs/remotes/origin/main'
          else
            echo "Skipping: no buf.yaml on main yet"
          fi

      - name: Verify Proto Sync
        run: make proto-check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@cac5638c2935870453cf669e803936a80e17ac7b
        with:
          go-version: "1.26.2"
          cache: true
          run-go-test: "true"
          go-test-race: "true"
          go-test-args: "./... -count=1"

      - name: Build
        run: go build ./...

      - name: Collect coverage
        id: coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -count=1
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')"
          echo "value=${coverage}" >> "$GITHUB_OUTPUT"
          awk -v got="${coverage}" -v floor="40" 'BEGIN { if ((got + 0) < (floor + 0)) exit 1 }'

      - name: Publish coverage summary
        run: |
          echo "Total coverage: ${{ steps.coverage.outputs.value }}%" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage.out
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@cac5638c2935870453cf669e803936a80e17ac7b
        with:
          go-version: "1.26.2"
          cache: true
          run-golangci-lint: "true"
          golangci-lint-args: "--timeout=5m ./..."

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@cac5638c2935870453cf669e803936a80e17ac7b
        with:
          go-version: "1.26.2"
          cache: true
          run-gosec: "true"
          run-govulncheck: "true"

      - name: Verify module checksums
        run: go mod verify
