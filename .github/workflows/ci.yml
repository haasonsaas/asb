name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@ca09da8302203b96582332dbcababe9f2d906d10
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1

      - name: Format
        run: make fmt

      - name: Buf lint
        run: buf lint

      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        run: |
          if git show origin/main:buf.yaml >/dev/null 2>&1; then
            git fetch origin main:refs/remotes/origin/main
            buf breaking --against '.git#ref=refs/remotes/origin/main'
          else
            echo "Skipping: no buf.yaml on main yet"
          fi

      - name: Verify Proto Sync
        run: make proto-check

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test
