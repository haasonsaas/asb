name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@ca09da8302203b96582332dbcababe9f2d906d10
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Format
        run: make fmt

      - name: Buf lint
        run: buf lint

      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=main'

      - name: Regenerate Protos
        run: buf generate

      - name: Verify Clean Working Tree
        run: git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test
